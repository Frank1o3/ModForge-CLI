name: Notify CoreOS repo on release

on:
    release:
        types: [published]

jobs:
    notify:
        runs-on: ubuntu-latest
        steps:
            - name: Extract version
              run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

            - name: Update PKGBUILD version and trigger build
              run: |
                  curl -X POST \
                    -H "Authorization: token ${{ secrets.COREOS_REPO_TOKEN }}" \
                    -H "Accept: application/vnd.github.v3+json" \
                    https://api.github.com/repos/Frank1o3/CoreOS-repo/dispatches \
                    -d "{\"event_type\": \"modforge-cli-release\", \"client_payload\": {\"version\": \"${VERSION}\", \"package\": \"modforge-cli\"}}"
